events {
    worker_connections 1024;
}

http {
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=200r/m;

    upstream identity_service {
        server identity-service:3001;
    }
    upstream campaign_service {
        server campaign-service:3002;
    }
    upstream ai_service {
        server ai-service:3003;
    }
    upstream gamification_service {
        server gamification-service:3004;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Pass real IP to services
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Service-Token' always;

        # Preflight
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Internal-only: used by auth_request to validate a bearer token before
        # proxying to routes that are always protected (never public).
        location = /internal/verify {
            internal;
            proxy_pass http://identity_service/v1/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
        }

        # ── Identity Service ──────────────────────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=20 nodelay;
            proxy_pass http://identity_service/v1/auth/;
        }
        location /api/v1/users {
            auth_request /internal/verify;
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://identity_service/v1/users;
        }
        location ~ ^/api/v1/users(/.*)? {
            auth_request /internal/verify;
            limit_req zone=api burst=50 nodelay;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://identity_service;
        }
        location /api/v1/audit {
            auth_request /internal/verify;
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://identity_service/v1/audit;
        }

        # ── Campaign Service ──────────────────────────────────────────────────
        location /api/v1/campaigns {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://campaign_service/v1/campaigns;
        }
        location ~ ^/api/v1/campaigns(/.*)? {
            limit_req zone=api burst=50 nodelay;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://campaign_service;
        }
        location /api/v1/cases {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://campaign_service/v1/cases;
        }
        location ~ ^/api/v1/cases(/.*)? {
            limit_req zone=api burst=50 nodelay;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://campaign_service;
        }
        location /api/v1/subscribers {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://campaign_service/v1/subscribers;
        }
        location ~ ^/api/v1/subscribers(/.*)? {
            limit_req zone=api burst=50 nodelay;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://campaign_service;
        }
        location /api/v1/experiments {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://campaign_service/v1/experiments;
        }
        location ~ ^/api/v1/experiments(/.*)? {
            limit_req zone=api burst=50 nodelay;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://campaign_service;
        }
        location /api/v1/analytics {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://campaign_service/v1/analytics;
        }
        location ~ ^/api/v1/analytics(/.*)? {
            limit_req zone=api burst=50 nodelay;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://campaign_service;
        }

        # ── AI Service ────────────────────────────────────────────────────────
        location /api/v1/ai {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://ai_service/v1/ai;
        }
        location ~ ^/api/v1/ai(/.*)? {
            limit_req zone=api burst=30 nodelay;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://ai_service;
        }

        # ── Gamification Service ──────────────────────────────────────────────
        location /api/v1/game {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://gamification_service/v1/game;
        }
        location ~ ^/api/v1/game(/.*)? {
            limit_req zone=api burst=50 nodelay;
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://gamification_service;
        }

        # ── Health ────────────────────────────────────────────────────────────
        location /healthz {
            return 200 '{"status":"ok","service":"gateway"}';
            add_header Content-Type application/json;
        }

        # 404 fallback
        location / {
            return 404 '{"error":"Route not found"}';
            add_header Content-Type application/json;
        }
    }
}
