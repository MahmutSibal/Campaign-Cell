          type: string
          enum: [DRAFT, ACTIVE, MANUAL_OPTIMIZATION_REQUIRED, OPTIMIZING, AB_TESTING, OPTIMIZED, PUBLISHED, ARCHIVED]
        segment:
          type: string
          enum: [YUKSEK_DEGER, RISKLI_KAYIP, YENI_ABONE, PASIF, BELIRSIZ]
        priority:
          type: string
          enum: [CRITICAL, HIGH, MEDIUM, LOW]
        discount:
          type: number
        startDate:
          type: string
        endDate:
          type: string
        recommendationScore:
          type: ["number", "null"]
        conversionProbability:
          type: ["number", "null"]
        aiReasoning:
          type: ["string", "null"]
