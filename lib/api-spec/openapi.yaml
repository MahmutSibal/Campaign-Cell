openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CampaignCell API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: campaigns
    description: Campaign management
  - name: cases
    description: Optimization case management
  - name: subscribers
    description: Subscriber profiles
  - name: ai
    description: AI analysis and predictions
  - name: gamification
    description: Points, badges, leaderboard
  - name: analytics
    description: Dashboard analytics and KPIs
  - name: experiments
    description: A/B test experiments
  - name: audit
    description: Audit logs
  - name: users
    description: User/staff management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ───────────────────────────────────────────────────────────────────
  /v1/auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with GSM + OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /v1/auth/request-otp:
    post:
      operationId: requestOtp
      tags: [auth]
      summary: Request OTP for GSM number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpRequestInput"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpRequestResponse"

  /v1/auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenInput"
      responses:
        "200":
          description: New tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /v1/auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout and revoke refresh token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /v1/auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # ─── CAMPAIGNS ──────────────────────────────────────────────────────────────
  /v1/campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List campaigns
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: segment
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignListResponse"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a new campaign
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignInput"
      responses:
        "201":
          description: Campaign created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /v1/campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get campaign by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Campaign detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    patch:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update campaign
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignUpdate"
      responses:
        "200":
          description: Campaign updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete campaign
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /v1/campaigns/{id}/analyze:
    post:
      operationId: analyzeCampaign
      tags: [campaigns]
      summary: Trigger AI analysis for campaign
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: AI analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiAnalysisResult"

  /v1/campaigns/{id}/publish:
    post:
      operationId: publishCampaign
      tags: [campaigns]
      summary: Publish a campaign
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Campaign published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /v1/campaigns/{id}/archive:
    post:
      operationId: archiveCampaign
      tags: [campaigns]
      summary: Archive a campaign
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Campaign archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  # ─── OPTIMIZATION CASES ─────────────────────────────────────────────────────
  /v1/cases:
    get:
      operationId: listCases
      tags: [cases]
      summary: List optimization cases
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
        - name: assignedTo
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of optimization cases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseListResponse"

  /v1/cases/{id}:
    get:
      operationId: getCase
      tags: [cases]
      summary: Get optimization case detail
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Case detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizationCase"
    patch:
      operationId: updateCase
      tags: [cases]
      summary: Update optimization case
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseUpdate"
      responses:
        "200":
          description: Case updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizationCase"

  /v1/cases/{id}/assign:
    post:
      operationId: assignCase
      tags: [cases]
      summary: Assign case to an expert
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseAssignInput"
      responses:
        "200":
          description: Case assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizationCase"

  /v1/cases/{id}/complete:
    post:
      operationId: completeCase
      tags: [cases]
      summary: Mark case as completed
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseCompleteInput"
      responses:
        "200":
          description: Case completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizationCase"

  /v1/cases/{id}/notes:
    post:
      operationId: addCaseNote
      tags: [cases]
      summary: Add optimization note to case
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseNoteInput"
      responses:
        "201":
          description: Note added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseNote"

  # ─── SUBSCRIBERS ────────────────────────────────────────────────────────────
  /v1/subscribers:
    get:
      operationId: listSubscribers
      tags: [subscribers]
      summary: List subscribers
      security:
        - bearerAuth: []
      parameters:
        - name: segment
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Subscriber list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriberListResponse"

  /v1/subscribers/{id}:
    get:
      operationId: getSubscriber
      tags: [subscribers]
      summary: Get subscriber 360 profile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subscriber profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriberProfile"

  /v1/subscribers/{id}/campaigns:
    get:
      operationId: getSubscriberCampaigns
      tags: [subscribers]
      summary: Get campaigns for a subscriber (personalized offers)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Personalized campaigns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriberCampaignListResponse"

  /v1/subscribers/{id}/offers/{campaignId}/accept:
    post:
      operationId: acceptOffer
      tags: [subscribers]
      summary: Subscriber accepts a campaign offer
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Offer accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /v1/subscribers/{id}/offers/{campaignId}/reject:
    post:
      operationId: rejectOffer
      tags: [subscribers]
      summary: Subscriber rejects a campaign offer
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfferRejectInput"
      responses:
        "200":
          description: Offer rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /v1/subscribers/{id}/offers/{campaignId}/rate:
    post:
      operationId: rateOffer
      tags: [subscribers]
      summary: Subscriber rates a campaign (1-5 stars)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfferRatingInput"
      responses:
        "200":
          description: Rating submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  # ─── AI ─────────────────────────────────────────────────────────────────────
  /v1/ai/predict:
    post:
      operationId: aiPredict
      tags: [ai]
      summary: Run AI recommendation + segmentation for campaign/subscriber
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiPredictInput"
      responses:
        "200":
          description: AI prediction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiPredictionDetail"

  /v1/ai/predictions:
    get:
      operationId: listPredictions
      tags: [ai]
      summary: List AI predictions
      security:
        - bearerAuth: []
      parameters:
        - name: campaignId
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Predictions list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictionListResponse"

  /v1/ai/accuracy:
    get:
      operationId: getAiAccuracy
      tags: [ai]
      summary: Get AI accuracy metrics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: AI accuracy metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiAccuracyMetrics"

  /v1/ai/expert-assignment:
    post:
      operationId: assignExpertAi
      tags: [ai]
      summary: AI-driven expert assignment for a case
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpertAssignmentInput"
      responses:
        "200":
          description: Recommended expert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpertAssignmentResult"

  # ─── GAMIFICATION ────────────────────────────────────────────────────────────
  /v1/game/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [gamification]
      summary: Get expert leaderboard
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [daily, weekly, all_time]
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResponse"

  /v1/game/profile/{userId}:
    get:
      operationId: getGameProfile
      tags: [gamification]
      summary: Get gamification profile for a user
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Game profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameProfile"

  /v1/game/badges:
    get:
      operationId: listBadges
      tags: [gamification]
      summary: List all available badges
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Badges list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadgeListResponse"

  /v1/game/points-history/{userId}:
    get:
      operationId: getPointsHistory
      tags: [gamification]
      summary: Get points transaction history for a user
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Points history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PointsHistoryResponse"

  # ─── ANALYTICS ──────────────────────────────────────────────────────────────
  /v1/analytics/dashboard:
    get:
      operationId: getDashboardKpis
      tags: [analytics]
      summary: Get supervisor/admin dashboard KPIs
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard KPIs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardKpis"

  /v1/analytics/conversion-trend:
    get:
      operationId: getConversionTrend
      tags: [analytics]
      summary: Get conversion rate trend over time
      security:
        - bearerAuth: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Conversion trend data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendDataResponse"

  /v1/analytics/campaign-distribution:
    get:
      operationId: getCampaignDistribution
      tags: [analytics]
      summary: Campaign distribution by segment and type
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Distribution data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DistributionDataResponse"

  /v1/analytics/expert-performance:
    get:
      operationId: getExpertPerformance
      tags: [analytics]
      summary: Expert performance metrics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Expert performance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpertPerformanceResponse"

  /v1/analytics/sla-compliance:
    get:
      operationId: getSlaCompliance
      tags: [analytics]
      summary: SLA compliance statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: SLA compliance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlaComplianceResponse"

  /v1/analytics/expert-kpis:
    get:
      operationId: getExpertKpis
      tags: [analytics]
      summary: Get KPIs for the logged-in campaign expert
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Expert KPIs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpertKpis"

  # ─── A/B EXPERIMENTS ────────────────────────────────────────────────────────
  /v1/experiments:
    get:
      operationId: listExperiments
      tags: [experiments]
      summary: List A/B experiments
      security:
        - bearerAuth: []
      parameters:
        - name: campaignId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Experiments list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExperimentListResponse"
    post:
      operationId: createExperiment
      tags: [experiments]
      summary: Create A/B experiment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExperimentInput"
      responses:
        "201":
          description: Experiment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Experiment"

  /v1/experiments/{id}:
    get:
      operationId: getExperiment
      tags: [experiments]
      summary: Get A/B experiment detail
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Experiment detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Experiment"

  /v1/experiments/{id}/conclude:
    post:
      operationId: concludeExperiment
      tags: [experiments]
      summary: Conclude an A/B experiment and pick winner
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExperimentConcludeInput"
      responses:
        "200":
          description: Experiment concluded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Experiment"

  # ─── AUDIT LOGS ─────────────────────────────────────────────────────────────
  /v1/audit:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: List audit logs
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: resource
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"

  # ─── USERS ──────────────────────────────────────────────────────────────────
  /v1/users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List staff users
      security:
        - bearerAuth: []
      parameters:
        - name: role
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
    post:
      operationId: createUser
      tags: [users]
      summary: Create staff account (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /v1/users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      security:
        - bearerAuth: []
      parameters:
