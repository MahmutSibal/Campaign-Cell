components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    # ── AUTH SCHEMAS ──────────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [gsmNumber, otp]
      properties:
        gsmNumber:
          type: string
        otp:
          type: string

    OtpRequestInput:
      type: object
      required: [gsmNumber]
      properties:
        gsmNumber:
          type: string

    OtpRequestResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    RefreshTokenInput:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"

    UserProfile:
      type: object
      required: [id, name, email, role, gsmNumber]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [SUBSCRIBER, CAMPAIGN_EXPERT, SUPERVISOR, ADMIN]
        gsmNumber:
          type: string
        isLocked:
          type: boolean
        createdAt:
          type: string

    # ── USER SCHEMAS ──────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, name, email, role, gsmNumber, isLocked, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [SUBSCRIBER, CAMPAIGN_EXPERT, SUPERVISOR, ADMIN]
        gsmNumber:
          type: string
        expertise:
          type: ["string", "null"]
        region:
          type: ["string", "null"]
        isLocked:
          type: boolean
        createdAt:
          type: string
        lastLoginAt:
          type: ["string", "null"]

    UserCreateInput:
      type: object
      required: [name, email, gsmNumber, role]
      properties:
        name:
          type: string
        email:
          type: string
        gsmNumber:
          type: string
        role:
          type: string
          enum: [SUBSCRIBER, CAMPAIGN_EXPERT, SUPERVISOR, ADMIN]
        expertise:
          type: string
        region:
          type: string

    UserUpdateInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [SUBSCRIBER, CAMPAIGN_EXPERT, SUPERVISOR, ADMIN]
        expertise:
          type: string
        region:
          type: string

    UserListResponse:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ── CAMPAIGN SCHEMAS ──────────────────────────────────────────────────────
